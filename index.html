const PROXY = "https://api.allorigins.win/get?url=";
const SECTOR_COLORS = {
  Tech:"#4da6ff",Auto:"#ffd700",Fin:"#00c896",Cons:"#ff9f43",
  Hlth:"#ff6b9d",Enrg:"#f8b739",Mat:"#c8a96e",LATM:"#48dbfb",
  ETF:"#a29bfe",Med:"#fd79a8",Ind:"#81ecec",
};

async function fetchPrice(ticker) {
  try {
    const url = encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=1d`);
    const res = await fetch(`${PROXY}${url}`);
    const outer = await res.json();
    const data = JSON.parse(outer.contents);
    const meta = data.chart.result[0].meta;
    const price = meta.regularMarketPrice;
    const prev = meta.chartPreviousClose;
    return { price, change: ((price - prev) / prev) * 100 };
  } catch { return null; }
}

async function fetchDolarCCL() {
  try {
    const url = encodeURIComponent("https://dolarapi.com/v1/dolares/contadoconliqui");
    const res = await fetch(`${PROXY}${url}`);
    const outer = await res.json();
    const data = JSON.parse(outer.contents);
    return data.venta || data.compra || null;
  } catch { return null; }
}

function App() {
  const [holdings, setHoldings] = useState({});
  const [prices, setPrices] = useState({});
  const [dolarCCL, setDolarCCL] = useState(null);
  const [loading, setLoading] = useState(false);
  const [lastUpdate, setLastUpdate] = useState(null);
  const [editTicker, setEditTicker] = useState(null);
  const [addMode, setAddMode] = useState(false);
  const [newTicker, setNewTicker] = useState("");
  const [newAmount, setNewAmount] = useState("");
  const [editAmount, setEditAmount] = useState("");
  const [customRatio, setCustomRatio] = useState("");
  const [customName, setCustomName] = useState("");
  const [extraTickers, setExtraTickers] = useState({});
  const [sortBy, setSortBy] = useState("value");
  const [currency, setCurrency] = useState("both");
  const [filterSector, setFilterSector] = useState("ALL");

  const allDB = { ...CEDEAR_DB, ...extraTickers };
  const getInfo = (t) => allDB[t] || { ratio: 1, name: t, emoji: "📈", sector: "?" };

  const getValueUSD = (ticker) => {
    const info = getInfo(ticker);
    const qty = holdings[ticker] || 0;
    const price = prices[ticker]?.price || 0;
    return info.ratioInverse ? qty * info.ratio * price : (qty / info.ratio) * price;
  };
  const getValueARS = (t) => getValueUSD(t) * (dolarCCL || 0);

  const fetchAll = useCallback(async () => {
    setLoading(true);
    const tickers = Object.keys(holdings);
    if (!tickers.length) { setLoading(false); return; }
    const [ccl, ...results] = await Promise.all([fetchDolarCCL(), ...tickers.map(fetchPrice)]);
    if (ccl) setDolarCCL(ccl);
    const p = {};
    tickers.forEach((t, i) => { if (results[i]) p[t] = results[i]; });
    setPrices(p);
    setLastUpdate(new Date());
    setLoading(false);
  }, [holdings]);

  useEffect(() => { if (Object.keys(holdings).length) fetchAll(); }, [holdings]);
  useEffect(() => { const iv = setInterval(fetchAll, 60000); return () => clearInterval(iv); }, [fetchAll]);

  const totalUSD = Object.keys(holdings).reduce((s, t) => s + getValueUSD(t), 0);
  const totalARS = totalUSD * (dolarCCL || 0);
  const totalChange = Object.keys(holdings).reduce((s, t) => {
    const w = totalUSD > 0 ? getValueUSD(t) / totalUSD : 0;
    return s + (prices[t]?.change || 0) * w;
  }, 0);

  const sectors = [...new Set(Object.keys(holdings).map(t => getInfo(t).sector))].filter(Boolean);
  const filtered = Object.keys(holdings).filter(t => filterSector === "ALL" || getInfo(t).sector === filterSector);
  const sorted = [...filtered].sort((a, b) => {
    if (sortBy === "value") return getValueUSD(b) - getValueUSD(a);
    if (sortBy === "change") return (prices[b]?.change || 0) - (prices[a]?.change || 0);
    return a.localeCompare(b);
  });

  const handleAdd = () => {
    const ticker = newTicker.toUpperCase().trim();
    if (!ticker || !newAmount || Number(newAmount) <= 0) return;
    if (!allDB[ticker] && customRatio) {
      setExtraTickers(prev => ({ ...prev, [ticker]: { ratio: Number(customRatio), name: customName || ticker, emoji: "📈", sector: "?" } }));
    }
    setHoldings(prev => ({ ...prev, [ticker]: Number(newAmount) }));
    setNewTicker(""); setNewAmount(""); setCustomRatio(""); setCustomName(""); setAddMode(false);
  };

  const fmtUSD = n => n.toLocaleString("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 });
  const fmtARS = n => `$${Math.round(n).toLocaleString("es-AR")}`;
  const fmtPct = n => `${n >= 0 ? "+" : ""}${n.toFixed(2)}%`;
  const pc = n => n >= 0 ? "#00c896" : "#ff4d6d";
  const matched = newTicker && allDB[newTicker.toUpperCase()];

  const S = {
    page: { minHeight:"100vh", background:"#070b14", fontFamily:"'Courier New',monospace", color:"#c8d8f0", backgroundImage:"radial-gradient(ellipse at 15% 40%,rgba(0,80,200,.07) 0%,transparent 55%),radial-gradient(ellipse at 85% 15%,rgba(0,200,150,.04) 0%,transparent 55%)" },
    header: { borderBottom:"1px solid rgba(0,200,150,.15)", padding:"18px 24px 14px", display:"flex", alignItems:"center", justifyContent:"space-between", background:"rgba(0,0,0,.4)", backdropFilter:"blur(8px)", position:"sticky", top:0, zIndex:10 },
    container: { padding:"18px 24px", maxWidth:920, margin:"0 auto" },
    syncBtn: (loading) => ({ background:"rgba(0,200,150,.12)", border:"1px solid rgba(0,200,150,.35)", color:loading?"#2a6a5a":"#00c896", padding:"5px 14px", cursor:"pointer", fontSize:10, letterSpacing:2, borderRadius:2 }),

    input: (extra={}) => ({ background:"rgba(0,0,0,.6)", border:"1px solid rgba(255,255,255,.1)", color:"#e0f0ff", padding:"6px 10px", fontSize:12, borderRadius:2, fontFamily:"'Courier New',monospace", ...extra }),
    ctrlBtn: (active, color="#00c896") => ({ background:active?`rgba(${color==="#00c896"?"0,200,150":"77,166,255"},.12)`:"transparent", border:`1px solid ${active?`rgba(${color==="#00c896"?"0,200,150":"77,166,255"},.4)`:"rgba(255,255,255,.06)"}`, color:active?color:"#3a4a6a", padding:"2px 9px", cursor:"pointer", fontSize:8, letterSpacing:2, borderRadius:2 }),
  };

  return (
    <div style={S.page}>

          <div style={{fontSize:20,fontWeight:"bold",letterSpacing:2,color:"#e0f0ff"}}>CEDEAR Dashboard</div>
        </div>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          {lastUpdate && <div style={{fontSize:9,color:"#3a4a6a",letterSpacing:1}}>SYNC {lastUpdate.toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"})}</div>}
          <button onClick={fetchAll} disabled={loading||!Object.keys(holdings).length} style={S.syncBtn(loading)}>{loading?"···":"↺ SYNC"}</button>
        </div>
      </div>

      <div style={S.container}>
        {Object.keys(holdings).length > 0 && (
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:10,marginBottom:20}}>
            {[
              {label:"TOTAL USD",value:fmtUSD(totalUSD),color:"#00c896"},
              {label:"TOTAL ARS",value:fmtARS(totalARS),color:"#4da6ff"},
              {label:"PERF HOY",value:fmtPct(totalChange),color:pc(totalChange)},
              {label:"CCL VENTA",value:dolarCCL?fmtARS(dolarCCL):"—",color:"#ffd700"},
            ].map(({label,value,color})=>(
              <div key={label} style={{background:"rgba(255,255,255,.025)",border:`1px solid ${color}18`,borderTop:`2px solid ${color}`,padding:"12px 14px",borderRadius:2}}>
                <div style={{fontSize:8,letterSpacing:3,color:"#3a4a6a",marginBottom:3}}>{label}</div>
                <div style={{fontSize:17,fontWeight:"bold",color,letterSpacing:1}}>{value}</div>
              </div>
            ))}
          </div>
        )}

        {Object.keys(holdings).length > 0 && (
          <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
            <span style={{fontSize:8,color:"#2a3a5a",letterSpacing:2}}>ORDEN</span>
            {["value","change","name"].map(s=>(
              <button key={s} onClick={()=>setSortBy(s)} style={S.ctrlBtn(sortBy===s)}>{s.toUpperCase()}</button>
            ))}
            <span style={{fontSize:8,color:"#2a3a5a",letterSpacing:2,marginLeft:6}}>VER</span>
            {["both","usd","ars"].map(c=>(
              <button key={c} onClick={()=>setCurrency(c)} style={S.ctrlBtn(currency===c,"#4da6ff")}>{c.toUpperCase()}</button>
            ))}
            {sectors.length > 1 && <>
              <span style={{fontSize:8,color:"#2a3a5a",letterSpacing:2,marginLeft:6}}>SECTOR</span>
              <button onClick={()=>setFilterSector("ALL")} style={{background:filterSector==="ALL"?"rgba(255,255,255,.08)":"transparent",border:`1px solid ${filterSector==="ALL"?"rgba(255,255,255,.2)":"rgba(255,255,255,.06)"}`,color:filterSector==="ALL"?"#c8d8f0":"#3a4a6a",padding:"2px 9px",cursor:"pointer",fontSize:8,letterSpacing:2,borderRadius:2}}>ALL</button>

                <button key={s} onClick={()=>setFilterSector(s)} style={{background:filterSector===s?`${sc}18`:"transparent",border:`1px solid ${filterSector===s?`${sc}55`:"rgba(255,255,255,.06)"}`,color:filterSector===s?sc:"#3a4a6a",padding:"2px 9px",cursor:"pointer",fontSize:8,letterSpacing:2,borderRadius:2}}>{s}</button>
              );})}
            </>}
          </div>
        )}

        <div>
          {sorted.map(ticker => {
            const info = getInfo(ticker);
            const qty = holdings[ticker];
            const pd = prices[ticker];
            const vUSD = getValueUSD(ticker);
            const vARS = getValueARS(ticker);
            const chg = pd?.change || 0;
            const weight = totalUSD > 0 ? (vUSD / totalUSD) * 100 : 0;
            const sc = SECTOR_COLORS[info.sector] || "#5a6a8a";
            return (
              <div key={ticker} style={S.card(chg)}>
                <div style={{position:"absolute",bottom:0,left:0,width:`${weight}%`,height:2,background:`${sc}44`,transition:"width .6s ease"}} />

                  <div style={{display:"flex",alignItems:"center",gap:10,minWidth:140}}>

                  </div>

                  <div style={{textAlign:"center",flex:1}}>
                    {editTicker === ticker ? (
                      <div style={{display:"flex",gap:5,justifyContent:"center"}}>
                        <input autoFocus type="number" value={editAmount}
                          onChange={e=>setEditAmount(e.target.value)}
                          onKeyDown={e=>e.key==="Enter"&&(setHoldings(p=>({...p,[ticker]:Number(editAmount)})),setEditTicker(null))}
                          style={S.input({width:70,fontSize:11})} />
                        <button onClick={()=>{setHoldings(p=>({...p,[ticker]:Number(editAmount)}));setEditTicker(null);}} style={{background:"rgba(0,200,150,.2)",border:"1px solid #00c896",color:"#00c896",padding:"3px 7px",cursor:"pointer",fontSize:9,borderRadius:2}}>✓</button>
                        <button onClick={()=>setEditTicker(null)} style={{background:"transparent",border:"1px solid #3a4a6a",color:"#3a4a6a",padding:"3px 7px",cursor:"pointer",fontSize:9,borderRadius:2}}>✕</button>
                      </div>
                    ) : (
                      <>
                        <div style={{fontSize:11,color:"#5a7a9a"}}>{qty} CEDs</div>
                        <div style={{fontSize:8,color:"#2a3a5a"}}>{info.ratioInverse?`1 CED = ${info.ratio} acc`:`${info.ratio} CEDs = 1 acc`}</div>
                        {pd && <div style={{fontSize:9,color:"#2a4a6a"}}>${pd.price.toFixed(2)} <span style={{color:pc(chg)}}>{fmtPct(chg)}</span></div>}
                      </>
                    )}
                  </div>

                  <div style={{textAlign:"right",minWidth:120}}>
                    {pd ? <>
                      {(currency==="usd"||currency==="both") && <div style={{fontSize:14,fontWeight:"bold",color:"#00c896",letterSpacing:1}}>{fmtUSD(vUSD)}</div>}
                      {(currency==="ars"||currency==="both") && <div style={{fontSize:currency==="both"?10:14,color:currency==="both"?"#2a4a6a":"#4da6ff",fontWeight:currency==="ars"?"bold":"normal"}}>{fmtARS(vARS)}</div>}
                      <div style={{fontSize:9,color:sc,marginTop:2,display:"flex",alignItems:"center",justifyContent:"flex-end",gap:4}}>
                        <div style={{width:28,height:3,background:"rgba(255,255,255,.06)",borderRadius:2,overflow:"hidden"}}>
                          <div style={{width:`${Math.min(weight,100)}%`,height:"100%",background:sc,borderRadius:2}} />
                        </div>
                        {weight.toFixed(1)}%
                      </div>
                    </> : <div style={{fontSize:9,color:"#1a2a4a"}}>sin precio</div>}
                  </div>

                  <div style={{display:"flex",gap:3,marginLeft:8}}>
                    <button onClick={()=>{setEditTicker(ticker);setEditAmount(String(qty));}} style={{background:"transparent",border:"1px solid rgba(255,255,255,.06)",color:"#3a4a6a",padding:"4px 7px",cursor:"pointer",fontSize:9,borderRadius:2}}>✎</button>
                    <button onClick={()=>setHoldings(p=>{const n={...p};delete n[ticker];return n;})} style={{background:"transparent",border:"1px solid rgba(255,60,80,.15)",color:"#5a2a3a",padding:"4px 7px",cursor:"pointer",fontSize:9,borderRadius:2}}>✕</button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>

        {addMode ? (
          <div style={{marginTop:10,background:"rgba(0,0,0,.5)",border:"1px solid rgba(0,200,150,.25)",padding:16,borderRadius:2}}>
            <div style={{fontSize:8,letterSpacing:3,color:"#00c896",marginBottom:12}}>+ AGREGAR CEDEAR</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"flex-end"}}>
              <div>
                <div style={{fontSize:8,color:"#3a4a6a",marginBottom:4,letterSpacing:1}}>TICKER</div>
                <input list="cedear-list" placeholder="AAPL, TSLA…" value={newTicker} onChange={e=>setNewTicker(e.target.value.toUpperCase())} style={S.input({width:110})} />
                <datalist id="cedear-list">{Object.entries(CEDEAR_DB).map(([k,v])=><option key={k} value={k}>{v.name}</option>)}</datalist>
              </div>
              <div>
                <div style={{fontSize:8,color:"#3a4a6a",marginBottom:4,letterSpacing:1}}>NOMINALES</div>
                <input type="number" placeholder="100" value={newAmount} onChange={e=>setNewAmount(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleAdd()} style={S.input({width:90})} />
              </div>
              {newTicker && !matched && <>
                <div>
                  <div style={{fontSize:8,color:"#ffd700",marginBottom:4,letterSpacing:1}}>RATIO</div>
                  <input type="number" placeholder="10" value={customRatio} onChange={e=>setCustomRatio(e.target.value)} style={S.input({width:70,borderColor:"rgba(255,215,0,.3)"})} />
                </div>
                <div>
                  <div style={{fontSize:8,color:"#ffd700",marginBottom:4,letterSpacing:1}}>NOMBRE</div>
                  <input placeholder="Empresa" value={customName} onChange={e=>setCustomName(e.target.value)} style={S.input({width:110,borderColor:"rgba(255,215,0,.3)"})} />
                </div>
              </>}
              <button onClick={handleAdd} style={{background:"rgba(0,200,150,.15)",border:"1px solid rgba(0,200,150,.45)",color:"#00c896",padding:"7px 18px",cursor:"pointer",fontSize:10,letterSpacing:2,borderRadius:2}}>AGREGAR</button>
              <button onClick={()=>{setAddMode(false);setNewTicker("");setNewAmount("");}} style={{background:"transparent",border:"1px solid rgba(255,255,255,.07)",color:"#3a4a6a",padding:"7px 14px",cursor:"pointer",fontSize:10,borderRadius:2}}>cancelar</button>
            </div>
            {matched && <div style={{fontSize:8,color:"#00c896",marginTop:8,letterSpacing:1}}>✓ {matched.name} · {matched.ratioInverse?`1 CEDEAR = ${matched.ratio} acciones`:`${matched.ratio} CEDEARs = 1 acción`} · Fuente: Comafi</div>}
          </div>
        ) : (
          <button onClick={()=>setAddMode(true)}
            onMouseEnter={e=>{e.currentTarget.style.borderColor="rgba(0,200,150,.4)";e.currentTarget.style.color="#00c896";}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(0,200,150,.15)";e.currentTarget.style.color="#1a3a2a";}}
            style={{marginTop:10,width:"100%",background:"rgba(255,255,255,.015)",border:"1px dashed rgba(0,200,150,.15)",color:"#1a3a2a",padding:"11px",cursor:"pointer",fontSize:10,letterSpacing:3,borderRadius:2}}>
            + AGREGAR CEDEAR
          </button>
        )}

        {!Object.keys(holdings).length && !addMode && (
          <div style={{textAlign:"center",padding:"52px 0",color:"#1a2a4a"}}>
            <div style={{fontSize:36,marginBottom:10}}>📊</div>
            <div style={{fontSize:10,letterSpacing:3}}>AGREGÁ TUS CEDEARs PARA EMPEZAR</div>
            <div style={{fontSize:8,color:"#0f1a2a",marginTop:6,letterSpacing:1}}>+80 tickers · ratios oficiales Comafi</div>
          </div>
        )}

        <div style={{marginTop:28,paddingTop:14,borderTop:"1px solid rgba(255,255,255,.03)",fontSize:8,color:"#0f1a2a",letterSpacing:1,textAlign:"center"}}>
          PRECIOS: YAHOO FINANCE · CCL: DOLARAPI · RATIOS: COMAFI 2025 · ACTUALIZA CADA 60s · SOLO REFERENCIAL
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
