<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Cartera CEDEAR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --bg2:       #161b22;
      --bg3:       #1c2230;
      --border:    #21262d;
      --border2:   #30363d;
      --text:      #e6edf3;
      --text2:     #8b949e;
      --text3:     #484f58;
      --green:     #3fb950;
      --green-dim: #1a3a20;
      --red:       #f85149;
      --red-dim:   #3a1a1a;
      --blue:      #58a6ff;
      --gold:      #d29922;
      --gold-bg:   #2a1f00;
      --mono:      'JetBrains Mono', 'Courier New', monospace;
      --sans:      'Inter', system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    input, button { font-family: var(--sans); }
    input:focus { outline: none; }
    a { color: var(--blue); }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    .mono { font-family: var(--mono); }

    /* ── ticker row hover ── */
    .ticker-row { transition: background .12s; }
    .ticker-row:hover { background: var(--bg3) !important; }

    /* ── editable cell ── */
    .editable { transition: border-color .15s, color .15s; }
    .editable:hover { border-color: var(--border2) !important; color: var(--text) !important; }

    /* ── pill badge ── */
    .badge-up   { background: var(--green-dim); color: var(--green); }
    .badge-down { background: var(--red-dim);   color: var(--red);   }

    /* ── stat card ── */
    .stat-card { transition: border-color .15s; }
    .stat-card:hover { border-color: var(--border2); }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const CARTERA = [
  { ticker: "SPY",  name: "SPDR S&P 500 ETF",        ratio: 30,  sector: "US Broad" },
  { ticker: "ACWI", name: "iShares MSCI ACWI ETF",    ratio: 11,  sector: "Global"   },
  { ticker: "SMH",  name: "VanEck Semiconductor ETF", ratio: 35,  sector: "Tech"     },
  { ticker: "GLD",  name: "SPDR Gold Shares",          ratio: 10,  sector: "Commodit" },
  { ticker: "GDX",  name: "VanEck Gold Miners ETF",   ratio: 10,  sector: "Commodit" },
  { ticker: "XLE",  name: "Energy Select Sector SPDR",ratio: 10,  sector: "Energy"   },
  { ticker: "IEMG", name: "iShares Core MSCI EM ETF", ratio: 5,   sector: "EM"       },
];

const SECTOR_COLOR = {
  "US Broad": "#58a6ff",
  "Global":   "#a5d6ff",
  "Tech":     "#d2a8ff",
  "Commodit": "#d29922",
  "Energy":   "#3fb950",
  "EM":       "#79c0ff",
};

async function fetchPrice(ticker, apiKey) {
  try {
    const res  = await fetch(`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${ticker}&apikey=${apiKey}`);
    const data = await res.json();
    const q    = data["Global Quote"];
    if (!q || !q["05. price"]) return null;
    const price  = parseFloat(q["05. price"]);
    const prev   = parseFloat(q["08. previous close"]);
    const change = ((price - prev) / prev) * 100;
    return { price, change };
  } catch { return null; }
}

async function fetchDolarCCL() {
  try {
    const res  = await fetch("https://dolarapi.com/v1/dolares/contadoconliqui");
    const data = await res.json();
    return data.venta || data.compra || null;
  } catch { return null; }
}

// ─── SETUP ────────────────────────────────────────────────────────────────────
function SetupScreen({ onSave }) {
  const [key, setKey] = useState("");
  return (
    <div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{maxWidth:460,width:"100%",background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:8,padding:36}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:24}}>
          <div style={{width:10,height:10,borderRadius:"50%",background:"var(--green)"}} />
          <span style={{fontFamily:"var(--mono)",fontSize:12,color:"var(--text2)",letterSpacing:1}}>PORTFOLIO SETUP</span>
        </div>
        <h1 style={{fontSize:22,fontWeight:700,color:"var(--text)",marginBottom:4}}>Mi Cartera CEDEAR</h1>
        <p style={{fontSize:13,color:"var(--text2)",marginBottom:28}}>SPY · ACWI · SMH · GLD · GDX · XLE · IEMG</p>

        <p style={{fontSize:13,color:"var(--text2)",lineHeight:1.7,marginBottom:20}}>
          Necesitás una API key gratuita de <a href="https://www.alphavantage.co/support/#api-key" target="_blank">Alpha Vantage</a> para cotizaciones en tiempo real.
        </p>

        <div style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:6,padding:"14px 16px",marginBottom:20}}>
          <div style={{fontSize:12,fontWeight:600,color:"var(--text)",marginBottom:8}}>Cómo obtener la key (30 seg)</div>
          {["Entrá a alphavantage.co → Support → API Key","Ponés nombre + email","Copiás la key que te mandan"].map((s,i)=>(
            <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:i<2?6:0}}>
              <div style={{minWidth:20,height:20,borderRadius:"50%",background:"var(--border2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:600,color:"var(--text2)",marginTop:1}}>{i+1}</div>
              <span style={{fontSize:13,color:"var(--text2)"}}>{s}</span>
            </div>
          ))}
        </div>

        <label style={{display:"block",fontSize:12,fontWeight:600,color:"var(--text2)",marginBottom:6,letterSpacing:.5}}>API KEY</label>
        <input type="text" placeholder="Ej: ABCDEF123456XYZ" value={key}
          onChange={e => setKey(e.target.value)}
          onKeyDown={e => e.key==="Enter" && key.trim() && onSave(key.trim())}
          style={{width:"100%",background:"var(--bg)",border:"1px solid var(--border2)",color:"var(--text)",padding:"10px 14px",fontSize:14,borderRadius:6,fontFamily:"var(--mono)",marginBottom:12}}
        />
        <button onClick={() => key.trim() && onSave(key.trim())}
          style={{width:"100%",background:"var(--green)",border:"none",color:"#000",padding:"11px",fontSize:14,fontWeight:700,borderRadius:6,cursor:"pointer",letterSpacing:.3}}>
          Ingresar al Dashboard →
        </button>
        <p style={{fontSize:11,color:"var(--text3)",marginTop:14,textAlign:"center"}}>La key se guarda en tu navegador. Plan gratuito: 25 consultas/día.</p>
      </div>
    </div>
  );
}

// ─── MAIN ─────────────────────────────────────────────────────────────────────
function App() {
  const [apiKey,    setApiKey]    = useState(() => localStorage.getItem("av_key") || "");
  const [nominales, setNominales] = useState(() => { try { return JSON.parse(localStorage.getItem("nominales")||"{}"); } catch { return {}; }});
  const [prices,    setPrices]    = useState({});
  const [ccl,       setCcl]       = useState(null);
  const [loading,   setLoading]   = useState(false);
  const [lastSync,  setLastSync]  = useState(null);
  const [apiError,  setApiError]  = useState("");
  const [editing,   setEditing]   = useState(null);
  const [editVal,   setEditVal]   = useState("");

  const saveKey = k => { localStorage.setItem("av_key", k); setApiKey(k); };

  useEffect(() => { localStorage.setItem("nominales", JSON.stringify(nominales)); }, [nominales]);

  const fetchAll = useCallback(async () => {
    if (!apiKey) return;
    setLoading(true); setApiError("");
    const cclVal = await fetchDolarCCL();
    if (cclVal) setCcl(cclVal);
    const newPrices = {};
    for (let i = 0; i < CARTERA.length; i++) {
      if (i > 0) await new Promise(r => setTimeout(r, 300));
      const r = await fetchPrice(CARTERA[i].ticker, apiKey);
      if (r) newPrices[CARTERA[i].ticker] = r;
      else   setApiError("Algunos precios no cargaron — límite Alpha Vantage: 25 req/día.");
    }
    setPrices(p => ({...p,...newPrices}));
    setLastSync(new Date());
    setLoading(false);
  }, [apiKey]);

  useEffect(() => { if (apiKey) fetchAll(); }, [apiKey]);
  useEffect(() => { const iv = setInterval(fetchAll, 120000); return ()=>clearInterval(iv); }, [fetchAll]);

  if (!apiKey) return <SetupScreen onSave={saveKey} />;

  const getUSD = t => {
    const info  = CARTERA.find(c => c.ticker===t);
    const qty   = nominales[t] || 0;
    const price = prices[t]?.price || 0;
    return qty && price ? (qty / info.ratio) * price : 0;
  };

  const totalUSD    = CARTERA.reduce((s,c) => s + getUSD(c.ticker), 0);
  const totalARS    = totalUSD * (ccl || 0);
  const hasNominals = CARTERA.some(c => nominales[c.ticker] > 0);
  const perf        = CARTERA.reduce((s,c) => {
    const w = totalUSD > 0 ? getUSD(c.ticker)/totalUSD : 0;
    return s + (prices[c.ticker]?.change||0)*w;
  }, 0);

  const fUSD = n => n.toLocaleString("en-US",{style:"currency",currency:"USD",minimumFractionDigits:2,maximumFractionDigits:2});
  const fARS = n => "$" + Math.round(n).toLocaleString("es-AR");
  const fPct = n => (n>=0?"+":"")+n.toFixed(2)+"%";
  const isUp = n => n >= 0;

  const saveEdit = ticker => {
    const v = parseFloat(editVal);
    if (!isNaN(v) && v >= 0) setNominales(p=>({...p,[ticker]:v}));
    setEditing(null);
  };

  return (
    <div style={{minHeight:"100vh",background:"var(--bg)",color:"var(--text)"}}>

      {/* ── TOPBAR ── */}
      <div style={{background:"var(--bg2)",borderBottom:"1px solid var(--border)",position:"sticky",top:0,zIndex:10}}>
        <div style={{maxWidth:1000,margin:"0 auto",padding:"0 20px",height:52,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:16}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:"var(--green)",boxShadow:"0 0 6px var(--green)"}} />
            <span style={{fontWeight:700,fontSize:15,letterSpacing:.3}}>Mi Cartera CEDEAR</span>
            <span style={{fontSize:12,color:"var(--text3)",fontFamily:"var(--mono)"}}>7 posiciones</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            {lastSync && (
              <span style={{fontSize:11,color:"var(--text3)",fontFamily:"var(--mono)"}}>
                {lastSync.toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"})}
              </span>
            )}
            <button onClick={fetchAll} disabled={loading}
              style={{background:loading?"var(--bg3)":"var(--bg3)",border:"1px solid var(--border2)",color:loading?"var(--text3)":"var(--text2)",padding:"5px 14px",fontSize:12,fontWeight:500,borderRadius:5,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:14,display:"inline-block",animation:loading?"spin 1s linear infinite":"none"}}>↻</span>
              {loading ? "Actualizando..." : "Actualizar"}
            </button>
            <button onClick={()=>{localStorage.removeItem("av_key");setApiKey("");}}
              title="Cambiar API Key"
              style={{background:"transparent",border:"1px solid var(--border)",color:"var(--text3)",padding:"5px 10px",fontSize:12,borderRadius:5,cursor:"pointer"}}>
              API Key
            </button>
          </div>
        </div>
      </div>

      <div style={{maxWidth:1000,margin:"0 auto",padding:"24px 20px"}}>

        {apiError && (
          <div style={{background:"var(--gold-bg)",border:"1px solid var(--gold)",borderRadius:6,padding:"10px 16px",fontSize:13,color:"var(--gold)",marginBottom:20,display:"flex",alignItems:"center",gap:10}}>
            <span>⚠</span> {apiError}
          </div>
        )}

        {/* ── STAT CARDS ── */}
        {hasNominals && (
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:28}}>
            {[
              {label:"Valor Total USD", value:fUSD(totalUSD),  sub:"al tipo CCL",      color:"var(--green)", border:"rgba(63,185,80,.3)"},
              {label:"Valor Total ARS", value:fARS(totalARS),  sub:"pesos argentinos", color:"var(--blue)",  border:"rgba(88,166,255,.3)"},
              {label:"Perf. del día",   value:fPct(perf),      sub:"variación pond.",  color:isUp(perf)?"var(--green)":"var(--red)", border:isUp(perf)?"rgba(63,185,80,.3)":"rgba(248,81,73,.3)"},
              {label:"Dólar CCL",       value:ccl?fARS(ccl):"—", sub:"tipo de cambio venta", color:"var(--gold)", border:"rgba(210,153,34,.3)"},
            ].map(({label,value,sub,color,border})=>(
              <div key={label} className="stat-card" style={{background:"var(--bg2)",border:`1px solid ${border}`,borderRadius:8,padding:"16px 18px"}}>
                <div style={{fontSize:11,fontWeight:500,color:"var(--text2)",marginBottom:6,letterSpacing:.3}}>{label}</div>
                <div style={{fontSize:20,fontWeight:700,color,fontFamily:"var(--mono)",letterSpacing:.5}}>{value}</div>
                <div style={{fontSize:11,color:"var(--text3)",marginTop:4}}>{sub}</div>
              </div>
            ))}
          </div>
        )}

        {/* ── TABLE HEADER ── */}
        <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 1fr 1.2fr",gap:0,padding:"8px 16px",marginBottom:4}}>
          {["Instrumento","Precio USD","Var. día","Nominales","Valor USD","Cartera"].map(h=>(
            <div key={h} style={{fontSize:11,fontWeight:600,color:"var(--text3)",letterSpacing:.5,textTransform:"uppercase",textAlign:h==="Instrumento"?"left":"right"}}>{h}</div>
          ))}
        </div>

        {/* ── ROWS ── */}
        <div style={{display:"flex",flexDirection:"column",gap:2}}>
          {CARTERA.map(({ ticker, name, ratio, sector }) => {
            const pd     = prices[ticker];
            const qty    = nominales[ticker] || 0;
            const vUSD   = getUSD(ticker);
            const vARS   = vUSD * (ccl||0);
            const chg    = pd?.change || 0;
            const weight = hasNominals && totalUSD>0 ? (vUSD/totalUSD)*100 : 0;
            const isEdit = editing === ticker;
            const sc     = SECTOR_COLOR[sector] || "var(--text2)";

            return (
              <div key={ticker} className="ticker-row" style={{
                background:"var(--bg2)",
                border:"1px solid var(--border)",
                borderRadius:8,
                padding:"14px 16px",
                display:"grid",
                gridTemplateColumns:"2fr 1fr 1fr 1fr 1fr 1.2fr",
                alignItems:"center",
                gap:0,
                position:"relative",
                overflow:"hidden",
              }}>

                {/* progress bar at bottom */}
                {weight>0 && (
                  <div style={{position:"absolute",bottom:0,left:0,width:`${weight}%`,height:2,background:"rgba(63,185,80,.4)",transition:"width .6s ease"}} />
                )}

                {/* ── col 1: identity ── */}
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <div style={{width:36,height:36,borderRadius:6,background:"var(--bg3)",border:"1px solid var(--border2)",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <span style={{fontFamily:"var(--mono)",fontSize:11,fontWeight:700,color:sc}}>{ticker}</span>
                  </div>
                  <div>
                    <div style={{fontSize:14,fontWeight:600,color:"var(--text)"}}>{ticker}</div>
                    <div style={{fontSize:11,color:"var(--text2)",marginTop:1}}>{name}</div>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginTop:3}}>
                      <span style={{fontSize:10,color:sc,background:`${sc}15`,padding:"1px 7px",borderRadius:10,fontWeight:500}}>{sector}</span>
                      <span style={{fontSize:10,color:"var(--text3)",fontFamily:"var(--mono)"}}>{ratio}:1</span>
                    </div>
                  </div>
                </div>

                {/* ── col 2: price ── */}
                <div style={{textAlign:"right"}}>
                  {pd ? (
                    <div style={{fontFamily:"var(--mono)",fontSize:14,fontWeight:600,color:"var(--text)"}}>${pd.price.toFixed(2)}</div>
                  ) : (
                    <div style={{fontSize:12,color:"var(--text3)"}}>—</div>
                  )}
                </div>

                {/* ── col 3: change badge ── */}
                <div style={{textAlign:"right"}}>
                  {pd ? (
                    <span className={isUp(chg)?"badge-up":"badge-down"} style={{
                      fontFamily:"var(--mono)",fontSize:12,fontWeight:600,
                      padding:"3px 9px",borderRadius:5,display:"inline-block",
                    }}>
                      {fPct(chg)}
                    </span>
                  ) : (
                    <span style={{fontSize:12,color:"var(--text3)"}}>—</span>
                  )}
                </div>

                {/* ── col 4: nominales editable ── */}
                <div style={{textAlign:"right"}}>
                  {isEdit ? (
                    <div style={{display:"flex",gap:4,justifyContent:"flex-end"}}>
                      <input autoFocus type="number" value={editVal}
                        onChange={e=>setEditVal(e.target.value)}
                        onKeyDown={e=>{ if(e.key==="Enter") saveEdit(ticker); if(e.key==="Escape") setEditing(null); }}
                        style={{width:72,background:"var(--bg)",border:"1px solid var(--blue)",color:"var(--text)",padding:"4px 8px",fontSize:13,borderRadius:5,fontFamily:"var(--mono)",textAlign:"right"}}
                      />
                      <button onClick={()=>saveEdit(ticker)}
                        style={{background:"var(--green)",border:"none",color:"#000",padding:"4px 8px",fontSize:12,fontWeight:700,borderRadius:5,cursor:"pointer"}}>✓</button>
                    </div>
                  ) : (
                    <div className="editable" onClick={()=>{ setEditing(ticker); setEditVal(qty?String(qty):""); }}
                      style={{
                        cursor:"pointer",
                        fontFamily:"var(--mono)",fontSize:14,fontWeight:600,
                        color: qty ? "var(--text)" : "var(--text3)",
                        border:"1px solid transparent",
                        borderRadius:5,padding:"3px 8px",display:"inline-block",
                        textAlign:"right",minWidth:52,
                      }}
                      title="Click para editar">
                      {qty || <span style={{fontSize:12,color:"var(--text3)"}}>—</span>}
                    </div>
                  )}
                </div>

                {/* ── col 5: value USD ── */}
                <div style={{textAlign:"right"}}>
                  {qty>0 && pd ? (
                    <>
                      <div style={{fontFamily:"var(--mono)",fontSize:14,fontWeight:600,color:"var(--green)"}}>{fUSD(vUSD)}</div>
                      <div style={{fontFamily:"var(--mono)",fontSize:11,color:"var(--text3)",marginTop:2}}>{fARS(vARS)}</div>
                    </>
                  ) : (
                    <span style={{fontSize:12,color:"var(--text3)"}}>—</span>
                  )}
                </div>

                {/* ── col 6: weight ── */}
                <div style={{textAlign:"right",paddingLeft:8}}>
                  {weight>0 ? (
                    <>
                      <div style={{fontFamily:"var(--mono)",fontSize:13,fontWeight:600,color:"var(--text2)"}}>{weight.toFixed(1)}%</div>
                      <div style={{marginTop:5,height:4,background:"var(--bg3)",borderRadius:4,overflow:"hidden"}}>
                        <div style={{width:`${Math.min(weight,100)}%`,height:"100%",background:"rgba(63,185,80,.6)",borderRadius:4,transition:"width .6s ease"}} />
                      </div>
                    </>
                  ) : (
                    <span style={{fontSize:12,color:"var(--text3)"}}>—</span>
                  )}
                </div>

              </div>
            );
          })}
        </div>

        {!hasNominals && (
          <div style={{textAlign:"center",padding:"32px 0",color:"var(--text3)",fontSize:13}}>
            Hacé click en la columna <strong style={{color:"var(--text2)"}}>Nominales</strong> para ingresar tus posiciones
          </div>
        )}

        <div style={{marginTop:28,paddingTop:16,borderTop:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:11,color:"var(--text3)"}}>Precios: Alpha Vantage · CCL: DolarAPI · Ratios: Comafi · Solo referencial</span>
          <span style={{fontSize:11,color:"var(--text3)",fontFamily:"var(--mono)"}}>AUTO-SYNC 2 min</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
